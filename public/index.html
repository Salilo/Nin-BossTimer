<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ Boss Timer Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #2a3a5e;
        }
        
        .header h1 {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .header .subtitle {
            color: #8899bb;
            font-size: 14px;
        }
        
        .online-status {
            display: inline-block;
            background: #00ff00;
            color: #000;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2a3a5e;
        }
        
        .controls button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 13px;
        }
        
        .btn-add {
            background: #006400;
            color: white;
        }
        .btn-add:hover { background: #008000; }
        
        .btn-clear-history {
            background: #8b0000;
            color: white;
        }
        .btn-clear-history:hover { background: #cc0000; }
        
        .btn-notification {
            background: #4a6fa5;
            color: white;
        }
        .btn-notification:hover { background: #5a7fb5; }
        
        .boss-grid {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2a3a5e;
        }
        
        .boss-grid h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        .boss-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            background: #1a2a4a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #2a3a5e;
            transition: all 0.3s;
        }
        
        .boss-item:hover {
            background: #1f2f5a;
            border-color: #4a6a8e;
        }
        
        .boss-name {
            font-weight: bold;
            color: #ffd700;
            min-width: 120px;
        }
        
        .boss-status {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .boss-status.alive {
            background: #006400;
            color: #00ff00;
        }
        
        .boss-status.dead {
            background: #640000;
            color: #ff4444;
        }
        
        .boss-timer {
            font-family: 'Consolas', monospace;
            font-size: 16px;
            font-weight: bold;
            min-width: 60px;
        }
        
        .boss-timer.dead {
            color: #ff4444;
        }
        
        .boss-timer.alive {
            color: #00ff00;
        }
        
        .boss-kills {
            color: #8899bb;
            font-size: 13px;
        }
        
        .boss-actions {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }
        
        .boss-actions button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .btn-kill {
            background: #8b0000;
            color: white;
        }
        .btn-kill:hover { background: #cc0000; }
        
        .btn-respawn {
            background: #006400;
            color: white;
        }
        .btn-respawn:hover { background: #008000; }
        
        .btn-edit {
            background: #3a3a3a;
            color: white;
        }
        .btn-edit:hover { background: #4a4a4a; }
        
        .btn-delete {
            background: #8b0000;
            color: white;
        }
        .btn-delete:hover { background: #cc0000; }
        
        .status-section {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2a3a5e;
        }
        
        .status-section h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .status-text {
            font-family: 'Consolas', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.6;
            background: #0a1a2a;
            padding: 10px;
            border-radius: 5px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .history-section {
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #2a3a5e;
        }
        
        .history-section h2 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .history-count {
            color: #8899bb;
            font-size: 13px;
        }
        
        .history-list {
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.8;
            background: #0a1a2a;
            padding: 10px;
            border-radius: 5px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 3px 0;
            border-bottom: 1px solid #1a2a3a;
            display: flex;
            justify-content: space-between;
            color: #ccd;
        }
        
        .history-item .kill-boss {
            color: #ffd700;
            font-weight: bold;
        }
        
        .history-item .kill-number {
            color: #ff6b6b;
        }
        
        .history-item .kill-time {
            color: #8899bb;
        }
        
        .history-item .respawn-time {
            color: #51cf66;
        }
        
        .history-empty {
            color: #667;
            text-align: center;
            padding: 20px;
        }
        
        .last-update {
            color: #667;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }
        
        .config-path {
            color: #667;
            font-size: 11px;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
        }
        
        /* Notificação estilo Windows */
        .windows-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            border-left: 4px solid #ffd700;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9999;
            animation: slideIn 0.5s ease;
            min-width: 280px;
            border: 1px solid #2a3a5e;
        }
        
        .windows-notification .notif-title {
            color: #ffd700;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .windows-notification .notif-body {
            color: #e0e0e0;
            font-size: 13px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            .controls button {
                width: 100%;
            }
            .boss-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .boss-actions {
                margin-left: 0;
                width: 100%;
                flex-wrap: wrap;
            }
            .boss-actions button {
                flex: 1;
                min-width: 60px;
            }
            .history-item {
                flex-direction: column;
                font-size: 12px;
                padding: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚔️ Boss Timer Manager</h1>
            <div class="subtitle">Sistema colaborativo de timers</div>
            <span class="online-status" id="onlineStatus">🟢 Online</span>
        </div>
        
        <!-- Controles -->
        <div class="controls">
            <button class="btn-add" onclick="openAddBoss()">➕ Adicionar Boss</button>
            <button class="btn-notification" onclick="testNotification()">🔔 Testar Notificação</button>
            <button class="btn-clear-history" onclick="clearHistory()">🗑️ Limpar Histórico</button>
        </div>
        
        <!-- Lista de Bosses -->
        <div class="boss-grid">
            <h2>👹 Bosses</h2>
            <div id="bossList"></div>
        </div>
        
        <!-- Status -->
        <div class="status-section">
            <h2>📊 Status dos Bosses</h2>
            <div class="status-text" id="statusText">Carregando...</div>
        </div>
        
        <!-- Timers Ativos -->
        <div class="status-section">
            <h2>⏱️ Timers Ativos</h2>
            <div class="status-text" id="timersText">Nenhum timer ativo</div>
        </div>
        
        <!-- Histórico de Kills -->
        <div class="history-section">
            <div class="history-header">
                <h2>📜 Histórico de Kills</h2>
                <span class="history-count" id="historyCount">0 kills registradas</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">Nenhuma kill registrada ainda</div>
            </div>
        </div>
        
        <div class="last-update" id="lastUpdate">Atualizado: agora</div>
        <div class="config-path">📁 Configurações salvas no servidor</div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="modal" style="background:#16213e; padding:30px; border-radius:12px; max-width:500px; width:90%; max-height:90vh; overflow-y:auto; border:1px solid #2a3a5e;">
            <div id="modalContent"></div>
        </div>
    </div>
    
    <script>
        // ===================== CONFIGURAÇÕES =====================
        const API_URL = window.location.origin + '/api';
        let refreshInterval = null;
        let lastBossStates = {};
        
        // ===================== FUNÇÕES PRINCIPAIS =====================
        
        async function fetchStatus() {
            try {
                const response = await fetch(API_URL + '/status');
                const data = await response.json();
                checkRespawnNotifications(data);
                renderBosses(data);
                renderStatus(data);
                renderTimers(data);
                renderHistory(data);
                document.getElementById('lastUpdate').textContent = 'Atualizado: ' + new Date().toLocaleTimeString();
                document.getElementById('onlineStatus').textContent = '🟢 Online';
                document.getElementById('onlineStatus').style.background = '#00ff00';
            } catch (error) {
                console.error('Erro ao buscar status:', error);
                document.getElementById('onlineStatus').textContent = '🔴 Offline';
                document.getElementById('onlineStatus').style.background = '#ff0000';
            }
        }
        
        // Verificar se algum boss respawnou (para notificação)
        function checkRespawnNotifications(data) {
            const timers = data.timers || {};
            
            for (const [boss, timer] of Object.entries(timers)) {
                if (timer.isActive && lastBossStates[boss] && !lastBossStates[boss].isActive) {
                    // Boss respawnou!
                    showWindowsNotification('🔄 Boss Vivo!', `${boss} respawnou e está vivo!`);
                }
                lastBossStates[boss] = { isActive: timer.isActive };
            }
            
            // Verificar bosses que não estão mais no timer (respawnaram)
            for (const [boss, state] of Object.entries(lastBossStates)) {
                if (state.isActive && !timers[boss]) {
                    showWindowsNotification('🔄 Boss Vivo!', `${boss} respawnou e está vivo!`);
                    lastBossStates[boss] = { isActive: false };
                }
            }
        }
        
        function renderBosses(data) {
            const list = document.getElementById('bossList');
            list.innerHTML = '';
            
            const bossNames = Object.keys(data.bosses);
            if (bossNames.length === 0) {
                list.innerHTML = '<p style="color: #667; text-align: center;">Nenhum boss cadastrado</p>';
                return;
            }
            
            for (const nome of bossNames) {
                const respawnTime = data.bosses[nome];
                const kills = data.kill_counts[nome] || 0;
                const isDead = data.timers && data.timers[nome] && data.timers[nome].isActive;
                const timer = data.timers && data.timers[nome];
                
                let timerText = '🟢 Vivo';
                let timerClass = 'alive';
                let statusClass = 'alive';
                let statusText = '🟢 Vivo';
                
                if (isDead) {
                    const m = timer.minutes || 0;
                    const s = timer.seconds || 0;
                    timerText = `🔴 ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                    timerClass = 'dead';
                    statusClass = 'dead';
                    statusText = '🔴 Morto';
                }
                
                const div = document.createElement('div');
                div.className = 'boss-item';
                div.innerHTML = `
                    <span class="boss-name">${nome}</span>
                    <span class="boss-status ${statusClass}">${statusText}</span>
                    <span class="boss-timer ${timerClass}">${timerText}</span>
                    <span class="boss-kills">💀 ${kills}</span>
                    <span class="boss-kills">⏱️ ${respawnTime}min</span>
                    <div class="boss-actions">
                        ${!isDead ? `<button class="btn-kill" onclick="killBoss('${nome}')">☠️ Matar</button>` : ''}
                        ${isDead ? `<button class="btn-respawn" onclick="respawnBoss('${nome}')">✅ Vivo</button>` : ''}
                        <button class="btn-edit" onclick="editKills('${nome}')">✏️</button>
                        <button class="btn-delete" onclick="deleteBoss('${nome}')">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            }
        }
        
        function renderStatus(data) {
            const text = document.getElementById('statusText');
            let output = '';
            for (const [nome, tempo] of Object.entries(data.bosses)) {
                const kills = data.kill_counts[nome] || 0;
                const isDead = data.timers && data.timers[nome] && data.timers[nome].isActive;
                const status = isDead ? '🔴 Morto' : '🟢 Vivo';
                output += `${nome}: ${status} | 💀 ${kills} | ⏱️ ${tempo}min\n`;
            }
            text.textContent = output || 'Nenhum boss cadastrado';
        }
        
        function renderTimers(data) {
            const text = document.getElementById('timersText');
            let output = '';
            const timers = data.timers || {};
            const bossNames = Object.keys(timers);
            
            if (bossNames.length === 0) {
                text.textContent = 'Nenhum timer ativo';
                return;
            }
            
            for (const [nome, timer] of Object.entries(timers)) {
                if (timer.isActive) {
                    const m = timer.minutes || 0;
                    const s = timer.seconds || 0;
                    const kills = data.kill_counts[nome] || 0;
                    const respawnTime = new Date(timer.endTime);
                    output += `${nome}: ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} | 💀 ${kills} | ⏰ ${respawnTime.toLocaleTimeString()}\n`;
                }
            }
            text.textContent = output || 'Nenhum timer ativo';
        }
        
        function renderHistory(data) {
            const list = document.getElementById('historyList');
            const count = document.getElementById('historyCount');
            const history = data.kill_history || [];
            
            count.textContent = `${history.length} kills registradas`;
            
            if (history.length === 0) {
                list.innerHTML = '<div class="history-empty">Nenhuma kill registrada ainda</div>';
                return;
            }
            
            // Mostrar do mais recente para o mais antigo
            const reversed = [...history].reverse();
            let html = '';
            for (const item of reversed) {
                const killTime = new Date(item.kill_time);
                const respawnTime = new Date(item.respawn_time);
                html += `
                    <div class="history-item">
                        <span>
                            <span class="kill-boss">${item.boss}</span>
                            <span class="kill-number">#${item.kill_number}</span>
                        </span>
                        <span>
                            <span class="kill-time">💀 ${killTime.toLocaleString()}</span>
                            <span class="respawn-time"> | ⏰ ${respawnTime.toLocaleTimeString()}</span>
                        </span>
                    </div>
                `;
            }
            list.innerHTML = html;
        }
        
        // ===================== NOTIFICAÇÕES WINDOWS =====================
        
        function showWindowsNotification(title, message) {
            // Verificar se tem permissão
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, {
                    body: message,
                    icon: '🔔'
                });
            }
            
            // Notificação visual na página (fallback)
            const existing = document.querySelector('.windows-notification');
            if (existing) {
                existing.remove();
            }
            
            const notif = document.createElement('div');
            notif.className = 'windows-notification';
            notif.innerHTML = `
                <div class="notif-title">${title}</div>
                <div class="notif-body">${message}</div>
            `;
            document.body.appendChild(notif);
            
            // Remover após 5 segundos
            setTimeout(() => {
                notif.style.animation = 'slideOut 0.5s ease';
                setTimeout(() => notif.remove(), 500);
            }, 5000);
        }
        
        function testNotification() {
            showWindowsNotification('🔔 Teste de Notificação', 'Isso é uma notificação de teste do Boss Timer!');
        }
        
        // ===================== AÇÕES DOS BOSSES =====================
        
        async function killBoss(nome) {
            if (!confirm(`☠️ Confirmar morte do ${nome}?`)) return;
            
            try {
                const response = await fetch(API_URL + '/kill', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ boss: nome })
                });
                const data = await response.json();
                if (data.success) {
                    fetchStatus();
                    showWindowsNotification('☠️ Boss Morto!', `${nome} foi morto! Respawn em ${data.respawn_minutes}min`);
                }
            } catch (error) {
                console.error('Erro ao matar boss:', error);
            }
        }
        
        async function respawnBoss(nome) {
            try {
                const response = await fetch(API_URL + '/respawn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ boss: nome })
                });
                const data = await response.json();
                if (data.success) {
                    fetchStatus();
                    showWindowsNotification('✅ Boss Vivo!', `${nome} está vivo novamente!`);
                }
            } catch (error) {
                console.error('Erro ao respawnar boss:', error);
            }
        }
        
        async function deleteBoss(nome) {
            if (!confirm(`🗑️ Remover ${nome} permanentemente?`)) return;
            
            try {
                const response = await fetch(API_URL + '/boss', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome })
                });
                const data = await response.json();
                if (data.success) {
                    fetchStatus();
                    showWindowsNotification('🗑️ Boss Removido', `${nome} foi removido!`);
                }
            } catch (error) {
                console.error('Erro ao remover boss:', error);
            }
        }
        
        // ===================== EDIÇÃO =====================
        
        function editKills(nome) {
            openModal(`
                <h2 style="color:#ffd700;">✏️ Editar Kills - ${nome}</h2>
                <label style="display:block; margin:10px 0 5px; font-weight:bold; color:#ccd;">Número de kills:</label>
                <input type="number" id="editKillsInput" min="0" value="${getKillsFromStatus(nome)}" style="width:100%; padding:10px; border:1px solid #2a3a5e; border-radius:5px; background:#0a1a2a; color:white; font-size:14px;">
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-modal-cancel" onclick="closeModal()" style="flex:1; padding:10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; background:#8b0000; color:white;">❌ Cancelar</button>
                    <button class="btn-modal-save" onclick="saveKills('${nome}')" style="flex:1; padding:10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; background:#006400; color:white;">💾 Salvar</button>
                </div>
            `);
        }
        
        function getKillsFromStatus(nome) {
            const statusText = document.getElementById('statusText').textContent;
            const match = statusText.match(new RegExp(`${nome}:[^|]*\\| 💀 (\\d+)`));
            return match ? parseInt(match[1]) : 0;
        }
        
        async function saveKills(nome) {
            const input = document.getElementById('editKillsInput');
            const kills = parseInt(input.value);
            if (isNaN(kills) || kills < 0) {
                alert('Digite um número válido!');
                return;
            }
            
            try {
                const response = await fetch(API_URL + '/edit-kills', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ boss: nome, kills })
                });
                const data = await response.json();
                if (data.success) {
                    closeModal();
                    fetchStatus();
                    showWindowsNotification('✏️ Kills Atualizadas', `${nome}: ${kills} kills`);
                }
            } catch (error) {
                console.error('Erro ao editar kills:', error);
            }
        }
        
        // ===================== ADICIONAR BOSS =====================
        
        function openAddBoss() {
            openModal(`
                <h2 style="color:#ffd700;">➕ Adicionar Novo Boss</h2>
                <label style="display:block; margin:10px 0 5px; font-weight:bold; color:#ccd;">👤 Nome do Boss:</label>
                <input type="text" id="addBossNome" placeholder="Ex: Lich King" style="width:100%; padding:10px; border:1px solid #2a3a5e; border-radius:5px; background:#0a1a2a; color:white; font-size:14px;">
                <label style="display:block; margin:10px 0 5px; font-weight:bold; color:#ccd;">⏱️ Tempo de Respawn (minutos):</label>
                <input type="number" id="addBossTempo" placeholder="5" min="1" style="width:100%; padding:10px; border:1px solid #2a3a5e; border-radius:5px; background:#0a1a2a; color:white; font-size:14px;">
                <label style="display:block; margin:10px 0 5px; font-weight:bold; color:#ccd;">💀 Kills iniciais:</label>
                <input type="number" id="addBossKills" placeholder="0" min="0" value="0" style="width:100%; padding:10px; border:1px solid #2a3a5e; border-radius:5px; background:#0a1a2a; color:white; font-size:14px;">
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-modal-cancel" onclick="closeModal()" style="flex:1; padding:10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; background:#8b0000; color:white;">❌ Cancelar</button>
                    <button class="btn-modal-save" onclick="saveNewBoss()" style="flex:1; padding:10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; background:#006400; color:white;">✅ Adicionar Boss</button>
                </div>
            `);
            
            setTimeout(() => document.getElementById('addBossNome')?.focus(), 100);
        }
        
        async function saveNewBoss() {
            const nome = document.getElementById('addBossNome').value.trim();
            const tempo = parseInt(document.getElementById('addBossTempo').value);
            const kills = parseInt(document.getElementById('addBossKills').value) || 0;
            
            if (!nome) {
                alert('Digite um nome para o boss!');
                return;
            }
            if (isNaN(tempo) || tempo <= 0) {
                alert('Digite um tempo válido!');
                return;
            }
            
            try {
                const response = await fetch(API_URL + '/boss', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, tempo, kills })
                });
                const data = await response.json();
                if (data.success) {
                    closeModal();
                    fetchStatus();
                    showWindowsNotification('✅ Boss Adicionado', `${nome} adicionado com sucesso!`);
                } else {
                    alert(data.error || 'Erro ao adicionar boss');
                }
            } catch (error) {
                console.error('Erro ao adicionar boss:', error);
            }
        }
        
        // ===================== LIMPAR HISTÓRICO =====================
        
        async function clearHistory() {
            if (!confirm('🗑️ Tem certeza que deseja limpar todo o histórico de kills?')) return;
            
            try {
                const response = await fetch(API_URL + '/clear-history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success) {
                    fetchStatus();
                    showWindowsNotification('🗑️ Histórico Limpo', 'Histórico de kills foi limpo!');
                }
            } catch (error) {
                console.error('Erro ao limpar histórico:', error);
            }
        }
        
        // ===================== MODAL =====================
        
        function openModal(html) {
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        
        // Fechar modal clicando fora
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // ===================== INICIALIZAÇÃO =====================
        
        // Solicitar permissão para notificações
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    console.log('🔔 Notificações permitidas!');
                }
            });
        }
        
        // Atualizar a cada 2 segundos
        fetchStatus();
        refreshInterval = setInterval(fetchStatus, 2000);
        
        // Atualizar ao focar a página
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                fetchStatus();
            }
        });
        
        console.log('⚔️ Boss Timer Manager iniciado!');
        console.log('🔔 Notificações ativadas para quando os bosses respawnarem');
    </script>
</body>
</html>
